<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Export</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding: 32px;
      background: #f3f7fc;
    }

    h1 {
      color: #1d4ed8;
      margin-bottom: 8px;
      font-size: 34px;
    }

    .subtext {
      margin-bottom: 18px;
      font-size: 13px;
      color: #475569;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 120px;
      padding: 14px 16px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 6px;
      border: 2px solid #93c5fd;
      background: #f8fbff;
      color: #0f172a;
      resize: vertical;
    }

    .editorSection {
      margin-top: 18px;
    }

    .editorLabel {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      letter-spacing: 0.02em;
    }

    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      font-size: 14px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }

    .actionRow {
      margin-top: 16px;
    }

    #progressContainer {
      margin-top: 25px;
      width: 100%;
      height: 28px;
      background: #dbeafe;
      border-radius: 8px;
      overflow: hidden;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #2563eb;
      color: white;
      text-align: center;
      line-height: 28px;
      font-weight: bold;
      transition: width 0.3s ease;
    }

    #status {
      margin-top: 18px;
      font-size: 14px;
      color: #1e3a8a;
    }

    .card {
      background: white;
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(15, 23, 42, 0.08);
      border: 1px solid #dbe4f0;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>SF Export</h1>
  <div class="subtext">Run a Salesforce Bulk API 2.0 export and download the results as CSV chunks.</div>

  <div class="editorSection">
    <label class="editorLabel" for="soql">SOQL Query</label>
    <textarea id="soql" placeholder="SELECT Id, Name FROM Account"></textarea>
  </div>

  <div class="actionRow">
    <button id="run" type="button">Start Export</button>
  </div>

  <div id="progressContainer">
    <div id="progressBar">0%</div>
  </div>

  <div id="status"></div>

</div>

<script src="app.js"></script>

</body>
</html>
